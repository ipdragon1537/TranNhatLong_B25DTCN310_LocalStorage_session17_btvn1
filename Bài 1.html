<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danh sách công việc Tết</title>
    <style>
      body {
        background-color: #fdf5e6;
        font-family: "Segoe UI", Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }

      .todo-card {
        background-color: #fff;
        width: 90%;
        max-width: 500px;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }

      .header {
        background-color: #d32f2f;
        color: white;
        text-align: center;
        padding: 30px 20px;
      }

      .header h1 {
        margin: 0;
        font-size: 24px;
      }
      .header p {
        margin: 10px 0 0;
        font-size: 14px;
        opacity: 0.9;
      }

      .todo-list {
        padding: 20px;
      }
      .todo-item {
        background-color: #fffaf0;
        margin-bottom: 15px;
        padding: 15px 20px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        border-left: 5px solid #ff9800;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      }

      .task-name {
        flex-grow: 1;
        color: #444;
        font-weight: 500;
      }
      .status-text {
        font-size: 13px;
        font-style: italic;
        color: #888;
      }

      .footer {
        text-align: center;
        padding: 20px;
        color: #888;
        font-size: 12px;
        border-top: 1px solid #eee;
      }
    </style>
  </head>
  <body>
    <div class="todo-card">
      <div class="header">
        <h1>Chuẩn bị Tết Nguyên Đán</h1>
        <p>Danh sách việc cần làm</p>
      </div>
      <div id="todo-container" class="todo-list"></div>
      <div id="status-footer" class="footer">
        Đã lưu vào localStorage lần đầu tiên • Refresh trang để kiểm tra
      </div>
    </div>
    <script src="Bài 1.js"></script>
  </body>
</html>
